<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SerpentRush</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="game-stage" aria-label="SerpentRush game">
        <header class="top-bar">
          <div>
            <p class="eyebrow">Arcade Snake</p>
            <h1>SerpentRush</h1>
          </div>
          <div class="status-pill" id="statusPill">Ready</div>
        </header>

        <div class="play-area">
          <canvas id="gameCanvas" width="720" height="720" aria-label="Game board"></canvas>
          <div class="overlay" id="overlay">
            <div class="overlay-panel">
              <p class="round-label" id="overlayLabel">Ready</p>
              <h2 id="overlayTitle">SerpentRush</h2>
              <p class="overlay-copy" id="overlayCopy">Collect bright fruit, chain combos, and survive the rush.</p>
              <button class="primary-action" id="startButton" type="button">Start Run</button>
            </div>
          </div>
        </div>

        <div class="touch-pad" aria-label="Touch controls">
          <button class="touch-button up" data-dir="up" type="button" aria-label="Move up">▲</button>
          <button class="touch-button left" data-dir="left" type="button" aria-label="Move left">◀</button>
          <button class="touch-button right" data-dir="right" type="button" aria-label="Move right">▶</button>
          <button class="touch-button down" data-dir="down" type="button" aria-label="Move down">▼</button>
        </div>
      </section>

      <aside class="side-panel" aria-label="Game stats">
        <div class="brand-block">
          <span class="brand-mark"></span>
          <div>
            <p class="eyebrow">Live Run</p>
            <h2>Rush Board</h2>
          </div>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div class="stat-card">
            <span>Best</span>
            <strong id="bestValue">0</strong>
          </div>
          <div class="stat-card">
            <span>Combo</span>
            <strong id="comboValue">x1</strong>
          </div>
          <div class="stat-card">
            <span>Level</span>
            <strong id="levelValue">1</strong>
          </div>
        </div>

        <div class="meter-block">
          <div class="meter-head">
            <span>Rush</span>
            <strong id="rushLabel">0%</strong>
          </div>
          <div class="meter-track">
            <span id="rushMeter"></span>
          </div>
        </div>

        <div class="inventory">
          <div class="item-line">
            <span class="legend-dot fruit"></span>
            <span>Fruit</span>
            <strong>+10</strong>
          </div>
          <div class="item-line">
            <span class="legend-dot spark"></span>
            <span>Spark</span>
            <strong>Rush</strong>
          </div>
          <div class="item-line">
            <span class="legend-dot prism"></span>
            <span>Prism</span>
            <strong>x2</strong>
          </div>
          <div class="item-line">
            <span class="legend-dot wall"></span>
            <span>Block</span>
            <strong>Avoid</strong>
          </div>
        </div>

        <div class="actions">
          <button id="pauseButton" type="button">Pause</button>
          <button id="restartButton" type="button">Restart</button>
        </div>
      </aside>
    </main>

    <script src="game.js"></script>
  </body>
</html>
